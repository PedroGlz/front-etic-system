<app-module-table-shell
  eyebrow="PLANTILLAS"
  title="Plantillas de reportes"
  description="Administra los archivos de plantilla que se adjuntan a los paquetes exportados de inspecciones."
  [total]="templates().length"
  totalLabel="archivos disponibles">
  <div header-actions class="upload-actions">
    <input #templateFiles class="upload-input" type="file" multiple accept=".pdf,.xlsx,.xls" (change)="onFilesSelected($event)" />
    <p-button
      label="Subir plantillas"
      icon="pi pi-upload"
      [loading]="uploading()"
      (onClick)="templateFiles.click()" />
  </div>

  <div class="templates-grid">
    @if (loading()) {
      <article class="empty-card">Cargando plantillas...</article>
    } @else if (!templates().length) {
      <article class="empty-card">No hay plantillas disponibles.</article>
    } @else {
      @for (template of templates(); track template.name) {
        <article class="template-card">
          <div class="template-meta">
            <span class="template-icon">{{ template.extension.toLowerCase() === 'pdf' ? 'PDF' : 'XLS' }}</span>
            <div>
              <strong>{{ template.name }}</strong>
              <small>{{ fileSize(template.size) }}</small>
            </div>
          </div>
          <div class="template-actions">
            <p-button icon="pi pi-download" [text]="true" [rounded]="true" title="Descargar" (onClick)="download(template)" />
            <p-button icon="pi pi-trash" [text]="true" [rounded]="true" severity="danger" title="Eliminar" (onClick)="remove(template)" />
          </div>
        </article>
      }
    }
  </div>
</app-module-table-shell>
